pre-commit:
  parallel: false
  jobs:
    - name: typecheck
      run: pnpm typecheck
    - name: lint
      run: pnpm lint
    - name: format
      run: pnpm format:check
    - name: test
      run: pnpm test

pre-push:
  files: git ls-files
  jobs:
    - name: verify
      run: pnpm verify

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm exec commitlint --edit {1}
